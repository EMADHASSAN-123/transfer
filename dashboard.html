<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#065f46" />
    <title>لوحة الإدارة — التحويلات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans Arabic"', "system-ui", "sans-serif"],
            },
            boxShadow: { soft: "0 10px 40px -12px rgba(15, 23, 42, 0.18)" },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased hero-gradient">
    <div id="global-spinner" class="fixed inset-0 z-[120] hidden flex items-center justify-center bg-slate-900/20 backdrop-blur-[2px]" aria-hidden="true">
      <div class="flex items-center gap-3 rounded-2xl border border-white/40 bg-white/90 px-5 py-3 shadow-xl" role="status" aria-live="polite">
        <span class="h-5 w-5 animate-spin rounded-full border-2 border-emerald-200 border-t-emerald-700" aria-hidden="true"></span>
        <span class="text-sm font-medium text-slate-800">جاري المعالجة...</span>
      </div>
    </div>

    <header class="glass-nav sticky top-0 z-50 shadow-sm">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6">
        <div class="flex items-center gap-3">
          <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-emerald-800 text-sm font-bold text-white shadow-soft">MT</span>
          <div>
            <p class="text-sm font-semibold text-slate-900">لوحة الإدارة</p>
            <p id="user-email" class="max-w-[14rem] truncate text-xs text-slate-500"></p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <a href="index.html" class="rounded-xl px-3 py-2 text-xs font-semibold text-slate-600 transition hover:bg-white/80">العرض العام</a>
          <button
            id="logout-btn"
            type="button"
            class="focus-ring rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50"
          >
            خروج
          </button>
        </div>
      </div>
    </header>

    <div id="config-banner" class="hidden border-b border-amber-200 bg-amber-50 px-4 py-3 text-center text-sm text-amber-900">
      أنشئ ملف <code class="rounded bg-amber-100 px-1">js/config.js</code> من <code class="rounded bg-amber-100 px-1">js/config.example.js</code> وأدخل مفاتيح Supabase.
    </div>

    <main class="mx-auto max-w-6xl space-y-8 px-4 py-8 sm:px-6">
      <section class="rounded-3xl border border-white/50 bg-white/70 p-6 shadow-soft backdrop-blur-xl ring-1 ring-white/50 sm:p-8">
        <div class="mb-6 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 id="form-title" class="text-xl font-bold text-slate-900">إضافة تحويل</h1>
            <p class="mt-1 text-sm text-slate-600">أضف أو حدّث السجل ثم احفظ. الصورة اختيارية أثناء التعديل إن بقيت كما هي.</p>
          </div>
          <button id="reset-form" type="button" class="text-sm font-semibold text-emerald-800 underline-offset-4 hover:underline">مسح النموذج</button>
        </div>

        <form id="transfer-form" class="grid gap-4 sm:grid-cols-2">
          <input type="hidden" id="edit-id" value="" />
          <div class="sm:col-span-1">
            <label for="person_name" class="mb-1 block text-sm font-medium text-slate-700">اسم الشخص</label>
            <input id="person_name" required class="focus-ring w-full rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-sm" />
          </div>
          <div class="sm:col-span-1">
            <label for="amount" class="mb-1 block text-sm font-medium text-slate-700">المبلغ (ر.س)</label>
            <input id="amount" type="number" step="0.01" min="0" required class="focus-ring w-full rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-sm" />
          </div>
          <div class="sm:col-span-1">
            <label for="status" class="mb-1 block text-sm font-medium text-slate-700">الحالة</label>
            <select id="status" class="focus-ring w-full rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-sm">
              <option value="pending">قيد الانتظار</option>
              <option value="sent">تم الإرسال</option>
              <option value="delivered">تم التسليم</option>
            </select>
          </div>
          <div class="sm:col-span-1">
            <label for="image" class="mb-1 block text-sm font-medium text-slate-700">صورة التحويل</label>
            <input id="image" type="file" accept="image/*" class="focus-ring w-full rounded-2xl border border-dashed border-slate-200 bg-white/60 px-3 py-2 text-sm file:me-3 file:rounded-xl file:border-0 file:bg-emerald-50 file:px-3 file:py-2 file:text-xs file:font-semibold file:text-emerald-900" />
          </div>
          <div id="image-preview" class="hidden sm:col-span-2"></div>
          <div class="sm:col-span-2 flex flex-wrap gap-3">
            <button type="submit" class="focus-ring rounded-2xl bg-emerald-800 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-emerald-900/15 transition hover:bg-emerald-900">حفظ</button>
          </div>
        </form>
      </section>

      <section class="overflow-hidden rounded-3xl border border-white/50 bg-white/70 shadow-soft backdrop-blur-xl ring-1 ring-white/50">
        <div class="border-b border-slate-100/80 px-6 py-4">
          <h2 class="text-lg font-bold text-slate-900">كل السجلات</h2>
          <p class="text-xs text-slate-500">تحديث لحظي عند أي تغيير من أي جهاز.</p>
        </div>
        <div id="table-skeleton" class="hidden px-4 py-4"></div>
        <div class="overflow-x-auto">
          <table id="transfers-table" class="w-full min-w-[640px] text-right text-sm">
            <thead class="bg-slate-50/80 text-xs font-semibold uppercase tracking-wide text-slate-500">
              <tr>
                <th class="px-4 py-3">صورة</th>
                <th class="px-4 py-3">الاسم</th>
                <th class="px-4 py-3">المبلغ</th>
                <th class="px-4 py-3">الحالة</th>
                <th class="px-4 py-3">تاريخ الإنشاء</th>
                <th class="px-4 py-3 text-left">إجراءات</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module">
      import { initDashboard } from "./js/dashboard.js";
      initDashboard();
    </script>
  </body>
</html>
