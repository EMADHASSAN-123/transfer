<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="لوحة متابعة التحويلات المالية — عرض عام للسجلات مع تحديثات لحظية." />
    <meta name="theme-color" content="#065f46" />
    <title>متابعة التحويلات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans Arabic"', "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 40px -12px rgba(15, 23, 42, 0.18)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased hero-gradient">
    <a href="#main" class="skip-link focus-ring rounded-lg bg-white px-3 py-2 shadow">تخطي إلى المحتوى</a>

    <header class="glass-nav sticky top-0 z-50 shadow-sm">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
        <div class="flex items-center gap-3">
          <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-emerald-800 text-sm font-bold text-white shadow-soft">MT</span>
          <div>
            <p class="text-sm font-semibold text-slate-900">متابعة التحويلات</p>
          </div>
        </div>
        <nav class="flex items-center gap-2" aria-label="روابط رئيسية">
          <a href="index.html" class="rounded-xl bg-emerald-50 px-3 py-2 text-xs font-semibold text-emerald-900 ring-1 ring-emerald-100">الرئيسية</a>
          <a
            id="nav-admin-login"
            href="login.html"
            class="hidden rounded-xl px-3 py-2 text-xs font-semibold text-slate-600 transition hover:bg-white/80 hover:text-slate-900"
            >دخول الإدارة</a>
        </nav>
      </div>
    </header>

    <main id="main" class="mx-auto max-w-6xl px-4 py-10 sm:px-6">
      <section class="mb-10 text-center sm:text-right">
        <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">سجلات التحويل</h1>
      </section>

      <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <label class="relative block flex-1 sm:max-w-md">
          <span class="sr-only">بحث باسم الشخص</span>
          <input
            id="search"
            type="search"
            autocomplete="off"
            placeholder="ابحث باسم الشخص..."
            class="focus-ring w-full rounded-2xl border border-slate-200/80 bg-white/80 py-3 pe-4 ps-11 text-sm shadow-inner backdrop-blur transition placeholder:text-slate-400 hover:border-emerald-200 focus:border-emerald-400 focus:outline-none"
          />
          <svg class="pointer-events-none absolute end-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path stroke-width="2" stroke-linecap="round" d="M21 21l-4.3-4.3M11 18a7 7 0 100-14 7 7 0 000 14z" />
          </svg>
        </label>
        <p class="text-sm text-slate-500"><span id="result-count">0</span> نتيجة</p>
      </div>

      <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between" role="toolbar" aria-label="طريقة عرض السجلات">
        <div
          class="inline-flex rounded-2xl border border-slate-200/80 bg-white/70 p-1 shadow-sm backdrop-blur"
          role="group"
          aria-label="تبديل العرض"
        >
          <button type="button" id="view-table" class="focus-ring rounded-xl px-4 py-2 text-xs font-bold transition" aria-pressed="true">
            عرض جدولي
          </button>
          <button type="button" id="view-cards" class="focus-ring rounded-xl px-4 py-2 text-xs font-bold transition" aria-pressed="false">
            بطاقات
          </button>
        </div>
      </div>

      <div id="transfers-view" class="min-h-[12rem]"></div>
    </main>

    <footer class="mt-16 border-t border-slate-200/80 bg-white/40 py-8 text-center text-xs text-slate-500 backdrop-blur">
      <p>© <span id="y"></span> — متابعة التحويلات</p>
    </footer>

    <script type="module">
      import { initPublicPage } from "./js/public.js";
      document.getElementById("y").textContent = String(new Date().getFullYear());
      initPublicPage();
    </script>
  </body>
</html>
